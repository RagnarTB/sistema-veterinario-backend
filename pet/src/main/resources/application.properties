spring.application.name=pet

# Importar archivo de secretos local si existe (ignorado por Git)
spring.config.import=optional:classpath:application-secrets.properties

# Configuración de base de datos H2
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Habilitar la consola H2 (accesible en /h2-console)
spring.h2.console.enabled=true
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

# Credenciales fijas para desarrollo
spring.security.user.name=admin
spring.security.user.password=admin123

# JWT (Toma variable de entorno JWT_SECRET, si no, usa un valor de prueba o el de secrets)
jwt.secret=${JWT_SECRET:CLAVE_POR_DEFECTO_SOLO_PARA_PRUEBAS_1234567890}

# Email
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=ldtb2001@gmail.com
spring.mail.password=${MAIL_PASSWORD:password_de_aplicacion_aqui}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Google OAuth
google.oauth.client-id=${GOOGLE_CLIENT_ID:tu_client_id_google_aqui}